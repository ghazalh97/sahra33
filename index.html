<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connection Journey</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:#050505;
  color:white;
}

#gameWrapper{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(to top,#0f0f0f,#060606);
  transition:background 1s ease;
}

#world{
  position:absolute;
  width:4000px;
  height:100%;
  left:0;
  top:0;
}

.ground{
  position:absolute;
  bottom:0;
  width:100%;
  height:130px;
  background:linear-gradient(to top,#151515,#0d0d0d);
  border-top:1px solid rgba(255,255,255,0.05);
}

.player{
  position:absolute;
  width:45px;
  height:80px;
  bottom:130px;
  left:100px;
  transition:filter .4s ease;
  z-index:20;
}

.head{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#222;
  margin:auto;
}

.body{
  width:8px;
  height:28px;
  background:#222;
  margin:auto;
}

.arms{
  position:relative;
  width:40px;
  height:8px;
  margin:auto;
  margin-top:-22px;
}

.arm{
  position:absolute;
  width:18px;
  height:5px;
  background:#222;
  top:0;
  animation:walkArms .7s infinite alternate;
}

.arm.left{
  left:0;
}

.arm.right{
  right:0;
}

.legs{
  position:relative;
  width:26px;
  height:24px;
  margin:auto;
}

.leg{
  position:absolute;
  width:5px;
  height:22px;
  background:#222;
  bottom:0;
  animation:walkLegs .7s infinite alternate;
}

.leg.left{
  left:5px;
}

.leg.right{
  right:5px;
  animation-direction:alternate-reverse;
}

@keyframes walkLegs{
  from{
    transform:rotate(-12deg);
  }
  to{
    transform:rotate(12deg);
  }
}

@keyframes walkArms{
  from{
    transform:rotate(15deg);
  }
  to{
    transform:rotate(-15deg);
  }
}

.player.idle .arm,
.player.idle .leg{
  animation-play-state:paused;
}

.npc{
  position:absolute;
  width:40px;
  height:75px;
  bottom:130px;
  filter:grayscale(1);
  transition:all .4s ease;
}

.npc .nhead{
  width:24px;
  height:24px;
  background:#666;
  border-radius:50%;
  margin:auto;
}

.npc .nbody{
  width:7px;
  height:30px;
  background:#666;
  margin:auto;
}

.npc .nlegs{
  display:flex;
  justify-content:center;
  gap:10px;
}

.npc .nlegs div{
  width:4px;
  height:20px;
  background:#666;
}

.npc.active{
  filter:grayscale(0);
  transform:translateY(-6px) scale(1.06);
  box-shadow:0 0 25px rgba(255,100,150,.8);
}

.finish{
  position:absolute;
  bottom:130px;
  width:12px;
  height:220px;
  background:linear-gradient(to bottom,#fff,#ff5fa2);
  box-shadow:0 0 20px rgba(255,255,255,.8);
}

.finish::before{
  content:"";
  position:absolute;
  left:-20px;
  top:0;
  width:50px;
  height:10px;
  background:white;
}

.hud{
  position:fixed;
  top:20px;
  left:20px;
  z-index:100;
  width:320px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px;
  padding:18px;
}

.hud h2{
  font-size:1.1rem;
  margin-bottom:15px;
}

.heart-ui{
  font-size:2.7rem;
  text-align:center;
  margin-bottom:10px;
  transition:all .5s ease;
}

.progress{
  height:14px;
  background:#1a1a1a;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  transition:width .5s ease;
  background:linear-gradient(90deg,#ff4d7d,#ff87c0);
}

.info{
  margin-top:15px;
  color:#ccc;
  font-size:.92rem;
  line-height:1.6;
}

.connection-counter{
  margin-top:14px;
  font-weight:600;
}

#interactionText{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.08);
  padding:12px 24px;
  border-radius:20px;
  opacity:0;
  transition:.3s ease;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
}

#interactionText.show{
  opacity:1;
}

.ending{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
  opacity:0;
  pointer-events:none;
  transition:1s ease;
}

.ending.show{
  opacity:1;
  pointer-events:auto;
}

.end-heart{
  font-size:7rem;
  margin-bottom:20px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.end-text{
  font-size:2rem;
  text-align:center;
  font-weight:700;
}

.mood-overlay{
  position:absolute;
  inset:0;
  pointer-events:none;
  transition:1s ease;
  background:
    radial-gradient(circle at center,
      rgba(255,100,150,0.12),
      transparent 60%);
  opacity:0;
}

@media(max-width:768px){

  .hud{
    width:90%;
    left:50%;
    transform:translateX(-50%);
  }

  .end-text{
    font-size:1.5rem;
    padding:20px;
  }

}
</style>
</head>

<body>

<div id="gameWrapper">

  <div class="mood-overlay" id="moodOverlay"></div>

  <div class="hud">
    <h2>💫 Connection Journey</h2>

    <div class="heart-ui" id="heartIcon">🖤</div>

    <div class="progress">
      <div class="progress-bar" id="heartBar" style="width:0%"></div>
    </div>

    <div class="connection-counter">
      Connections:
      <span id="connectionCount">0</span>/5
    </div>

    <div class="info">
      Move: A / D or ← →<br>
      Connect: E<br>
      Reach the light at the end.
    </div>
  </div>

  <div id="interactionText">
    Press E to Connect
  </div>

  <div id="world">

    <div class="ground"></div>

    <div class="player idle" id="player">
      <div class="head"></div>
      <div class="body"></div>

      <div class="arms">
        <div class="arm left"></div>
        <div class="arm right"></div>
      </div>

      <div class="legs">
        <div class="leg left"></div>
        <div class="leg right"></div>
      </div>
    </div>

  </div>

  <div class="ending" id="endingScreen">
    <div class="end-heart" id="endHeart">🖤</div>
    <div class="end-text">
      You reached the end of connection 💫
    </div>
  </div>

</div>

<script>

const world = document.getElementById("world");
const player = document.getElementById("player");

const heartBar = document.getElementById("heartBar");
const heartIcon = document.getElementById("heartIcon");
const connectionCount = document.getElementById("connectionCount");
const interactionText = document.getElementById("interactionText");
const moodOverlay = document.getElementById("moodOverlay");

const endingScreen = document.getElementById("endingScreen");
const endHeart = document.getElementById("endHeart");

let playerX = 100;
let movingLeft = false;
let movingRight = false;

let cameraX = 0;

const speed = 4;

let connections = 0;

const npcPositions = [500, 1050, 1650, 2350, 3150];
const npcs = [];

npcPositions.forEach(pos => {

  const npc = document.createElement("div");

  npc.classList.add("npc");

  npc.style.left = pos + "px";

  npc.innerHTML = `
    <div class="nhead"></div>
    <div class="nbody"></div>
    <div class="nlegs">
      <div></div>
      <div></div>
    </div>
  `;

  npc.connected = false;

  world.appendChild(npc);

  npcs.push(npc);

});

const finish = document.createElement("div");

finish.classList.add("finish");

finish.style.left = "3700px";

world.appendChild(finish);

function updatePlayer(){

  if(movingLeft){
    playerX -= speed;
    player.classList.remove("idle");
  }

  if(movingRight){
    playerX += speed;
    player.classList.remove("idle");
  }

  if(!movingLeft && !movingRight){
    player.classList.add("idle");
  }

  if(playerX < 0){
    playerX = 0;
  }

  if(playerX > 3900){
    playerX = 3900;
  }

  player.style.left = playerX + "px";

  cameraX = playerX - window.innerWidth / 2;

  if(cameraX < 0){
    cameraX = 0;
  }

  world.style.transform =
    `translateX(${-cameraX}px)`;

  checkNPCs();

  checkEnding();

  requestAnimationFrame(updatePlayer);

}

function checkNPCs(){

  let nearNpc = false;

  npcs.forEach(npc => {

    const npcX = parseInt(npc.style.left);

    const distance =
      Math.abs(playerX - npcX);

    if(distance < 90 && !npc.connected){

      nearNpc = true;

      interactionText.classList.add("show");

      npc.classList.add("active");

      npc.currentNearby = true;

    } else {

      npc.classList.remove("active");

      npc.currentNearby = false;

    }

  });

  if(!nearNpc){
    interactionText.classList.remove("show");
  }

}

window.addEventListener("keydown",(e)=>{

  if(e.key === "ArrowLeft" || e.key === "a"){
    movingLeft = true;
  }

  if(e.key === "ArrowRight" || e.key === "d"){
    movingRight = true;
  }

  if(e.key.toLowerCase() === "e"){

    npcs.forEach(npc=>{

      if(npc.currentNearby && !npc.connected){

        npc.connected = true;

        npc.style.filter = "none";

        npc.style.boxShadow =
          "0 0 35px rgba(255,120,180,.9)";

        npc.innerHTML += `
          <div style="
            position:absolute;
            top:-30px;
            left:50%;
            transform:translateX(-50%);
            font-size:24px;
            animation:pulse 1s infinite;
          ">💖</div>
        `;

        connections++;

        updateEmotion();

        if(navigator.vibrate){
          navigator.vibrate(80);
        }

      }

    });

  }

});

window.addEventListener("keyup",(e)=>{

  if(e.key === "ArrowLeft" || e.key === "a"){
    movingLeft = false;
  }

  if(e.key === "ArrowRight" || e.key === "d"){
    movingRight = false;
  }

});

function updateEmotion(){

  const percentage =
    (connections / 5) * 100;

  heartBar.style.width =
    percentage + "%";

  connectionCount.innerText =
    connections;

  moodOverlay.style.opacity =
    percentage / 100;

  const glow =
    connections * 8;

  player.style.filter =
    `drop-shadow(0 0 ${glow}px rgba(255,90,150,.9))`;

  const colorStrength =
    connections * 30;

  const color = `
    rgb(
      ${40 + colorStrength},
      ${40},
      ${40 + connections*12}
    )
  `;

  player.querySelectorAll(
    ".head,.body,.arm,.leg"
  ).forEach(part=>{

    part.style.background = color;

  });

  if(connections === 0){
    heartIcon.innerHTML = "🖤";
  }
  else if(connections <= 2){
    heartIcon.innerHTML = "❤️";
  }
  else if(connections <= 4){
    heartIcon.innerHTML = "💓";
  }
  else{
    heartIcon.innerHTML = "💖";
  }

  // world mood transition

  document.getElementById("gameWrapper")
    .style.background = `
      linear-gradient(
        to top,
        rgb(${15 + connections*12},${10},${20 + connections*20}),
        rgb(${5},${5},${10 + connections*12})
      )
    `;

}

function checkEnding(){

  if(playerX > 3650){

    endingScreen.classList.add("show");

    if(connections <= 1){

      endHeart.innerHTML = "🖤";

    } else if(connections <= 3){

      endHeart.innerHTML = "❤️";

    } else {

      endHeart.innerHTML = "💖";

      endHeart.style.filter =
        "drop-shadow(0 0 30px hotpink)";
    }

  }

}

updatePlayer();

</script>

</body>
</html>
